{% load static %}

<header class="navbar">

  <div class="navbar__logo">
    <a href="/">
      <img src="{% static 'images/Logo.png' %}" alt="Logo AP Automotores">
    </a>
  </div>

  <!-- Botón hamburguesa -->
  <button class="navbar__menu" id="menuToggle" aria-label="Menú" aria-expanded="false">
    <span></span>
    <span></span>
    <span></span>
  </button>

</header>

<!-- Overlay oscuro detrás del drawer -->
<div class="drawer-overlay" id="drawerOverlay"></div>

<!-- Drawer lateral -->
<nav class="drawer" id="menuDrawer" aria-hidden="true">

  <div class="drawer__header">
    <img src="{% static 'images/Logo.png' %}" alt="Logo" class="drawer__logo">
    <button class="drawer__close" id="menuClose" aria-label="Cerrar menú">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <div class="drawer__body">

    <a href="/" class="drawer__link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Inicio
    </a>

    {% if user.is_authenticated %}

       {% if user.is_staff or user.is_superuser %}
        <a href="/panel/solicitudes/" class="drawer__link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Panel Interno
        </a>

        <a href="/admin/" class="drawer__link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          Administración
        </a>
      {% endif %}

      <div class="drawer__divider"></div>

      <div class="drawer__user">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        {{ user.username }}
      </div>

  <form action="{% url 'logout' %}" method="post">
  {% csrf_token %}
  <button type="submit" class="drawer__link drawer__link--logout">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2">
      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
      <polyline points="16 17 21 12 16 7"/>
      <line x1="21" y1="12" x2="9" y2="12"/>
    </svg>
    Cerrar Sesión
  </button>
</form>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Cerrar Sesión
      </a>

    {% else %}

      <div class="drawer__divider"></div>

      <a href="/login/" class="drawer__btn drawer__btn--primary">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Iniciar Sesión
      </a>

      <a href="/login/?tab=register" class="drawer__btn drawer__btn--ghost">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
        Registrarse
      </a>

    {% endif %}

  </div><!-- /drawer__body -->

  <!-- Decoración de esquinas (igual al form-card) -->
  <span class="card-corner card-corner--tl"></span>
  <span class="card-corner card-corner--tr"></span>
  <span class="card-corner card-corner--bl"></span>
  <span class="card-corner card-corner--br"></span>

</nav>

<!-- JS del drawer -->
<script>
(function () {
  const toggle  = document.getElementById('menuToggle');
  const drawer  = document.getElementById('menuDrawer');
  const overlay = document.getElementById('drawerOverlay');
  const close   = document.getElementById('menuClose');

  function openDrawer() {
    drawer.classList.add('drawer--open');
    overlay.classList.add('drawer-overlay--visible');
    toggle.classList.add('navbar__menu--active');
    toggle.setAttribute('aria-expanded', 'true');
    drawer.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
  }

  function closeDrawer() {
    drawer.classList.remove('drawer--open');
    overlay.classList.remove('drawer-overlay--visible');
    toggle.classList.remove('navbar__menu--active');
    toggle.setAttribute('aria-expanded', 'false');
    drawer.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
  }

  toggle.addEventListener('click', function () {
    drawer.classList.contains('drawer--open') ? closeDrawer() : openDrawer();
  });

  close.addEventListener('click', closeDrawer);
  overlay.addEventListener('click', closeDrawer);

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') closeDrawer();
  });
})();
</script>
